<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Logs | Aesthetic Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> ::-webkit-scrollbar { display: none; } </style>
</head>
<body class="bg-slate-50 font-sans h-screen flex flex-col antialiased select-none">
    <script>
        const session = JSON.parse(localStorage.getItem('sessionUser'));
        if (!session || new Date().getTime() > session.sessionExpiry || session.role !== 'Aesthetic') window.location.href = 'index.html';
        const API_URL = 'https://script.google.com/macros/s/AKfycbwS2HfNIHQlA_3Y_Z208Z2fPJIkg4STpCITvr1rDXsllQNwt-7NlooKhFxpsNnkZDelJw/exec';
    </script>

    <header class="bg-purple-700 text-white p-4 shadow-md flex justify-between items-center sticky top-0 z-10">
        <div>
            <h1 id="subjectTitle" class="text-base font-black uppercase tracking-wide">Studio Room</h1>
            <p class="text-[10px] uppercase font-bold text-purple-200">Aesthetic Verification Node</p>
        </div>
        <button onclick="localStorage.removeItem('sessionUser'); window.location.href='index.html';" class="text-xs font-bold bg-purple-800 px-3 py-2 rounded-xl">Sign Out</button>
    </header>

    <main class="flex-1 overflow-y-auto p-4 pb-24 max-w-md mx-auto w-full">
        <div class="mb-4 bg-white p-4 rounded-xl shadow-sm border border-slate-100">
            <label class="block text-[10px] font-black uppercase tracking-wider text-slate-400 mb-1.5">Query Targeting Classroom</label>
            <select id="classSelector" onchange="fetchClassRoster()" class="w-full bg-slate-100 p-3 rounded-xl text-slate-800 font-bold focus:ring-2 focus:ring-purple-500 outline-none text-sm">
                <option value="">-- Select Division Section --</option>
                <optgroup label="Grade 10"><option value="G10-A">G10 - A</option><option value="G10-B">G10 - B</option><option value="G10-C">G10 - C</option><option value="G10-D">G10 - D</option><option value="G10-E">G10 - E</option><option value="G10-F">G10 - F</option></optgroup>
                <optgroup label="Grade 11"><option value="G11-A">G11 - A</option><option value="G11-B">G11 - B</option><option value="G11-C">G11 - C</option><option value="G11-D">G11 - D</option><option value="G11-E">G11 - E</option><option value="G11-F">G11 - F</option></optgroup>
            </select>
        </div>
        <form id="aestheticForm"><div id="rosterWrapper" class="space-y-3"><div class="text-center py-12 text-xs text-slate-400 font-bold uppercase tracking-wider">Select division section to list checked profiles.</div></div></form>
    </main>

    <div class="fixed bottom-0 w-full bg-white border-t border-slate-100 p-4 max-w-md left-1/2 transform -translate-x-1/2 z-30">
        <button form="aestheticForm" type="submit" id="lockBtn" disabled class="w-full bg-purple-700 opacity-40 text-white font-extrabold py-3.5 rounded-xl text-sm uppercase tracking-wider shadow-lg">Synchronize Studio Records</button>
    </div>

    <script>
        document.getElementById('subjectTitle').innerText = `${session.assignedSubject} Suite`;
        async function fetchClassRoster() {
            const cls = document.getElementById('classSelector').value; const wrapper = document.getElementById('rosterWrapper'); const btn = document.getElementById('lockBtn');
            if(!cls) { btn.disabled = true; btn.classList.add('opacity-40'); return; }
            wrapper.innerHTML = `<div class="text-center py-12 text-xs text-slate-400 animate-pulse font-bold">CROSS-REFERENCING LIVE SCHOOL DAILY ATTENDANCE ENTRIES...</div>`;
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getAestheticStudents', className: cls, subject: session.assignedSubject }) });
            const data = await res.json();
            if (data.success) {
                wrapper.innerHTML = '';
                if(data.students.length === 0) { wrapper.innerHTML = `<div class="text-center py-6 text-xs font-bold text-amber-600 bg-amber-50 p-4 rounded-xl">No active, present students from ${cls} configured for ${session.assignedSubject} today.</div>`; btn.disabled = true; btn.classList.add('opacity-40'); return; }
                btn.disabled = false; btn.classList.remove('opacity-40');
                data.students.forEach(s => {
                    wrapper.innerHTML += `
                        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex items-center justify-between">
                            <div><h4 class="font-black text-slate-800 text-sm tracking-tight">${s.name}</h4><p class="text-[10px] text-slate-400 font-bold mt-0.5">ID: ${s.id}</p></div>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" name="aes_${s.id}" value="Present" class="sr-only peer" checked>
                                <div class="w-12 h-6 bg-slate-200 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-purple-600"></div>
                            </label>
                        </div>`;
                });
            }
        }
        document.getElementById('aestheticForm').addEventListener('submit', async (e) => {
            e.preventDefault(); const btn = document.getElementById('lockBtn'); btn.innerText = 'Locking...'; btn.disabled = true;
            let records = []; e.target.querySelectorAll('input[type="checkbox"]').forEach(input => { records.push({ studentId: input.name.split('_')[1], status: input.checked ? 'Present' : 'Absent' }); });
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'submitAestheticAttendance', records: records }) });
            const data = await res.json(); if(data.success) { btn.innerText = 'Synchronized Successfully! ✓'; btn.classList.replace('bg-purple-700', 'bg-emerald-600'); setTimeout(() => { btn.innerText = 'Synchronize Studio Records'; btn.classList.replace('bg-emerald-600', 'bg-purple-700'); btn.disabled = false; }, 2000); }
        });
    </script>
</body>
</html>

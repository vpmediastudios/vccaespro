<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Attendance | Teacher Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Hide default scrollbar styling for slick standalone app aesthetic */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 font-sans h-screen flex flex-col antialiased select-none">

    <script>
        const session = JSON.parse(localStorage.getItem('sessionUser'));
        const now = new Date().getTime();
        
        // Strict Gate: Session validity tracking up to 7 hours
        if (!session || now > session.sessionExpiry || session.role !== 'Class') {
            alert("Unauthorized or Session Timeout. Please log in again.");
            localStorage.removeItem('sessionUser');
            window.location.href = 'index.html';
        }
        
        // PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE
        const API_URL = 'https://script.google.com/macros/s/AKfycbwS2HfNIHQlA_3Y_Z208Z2fPJIkg4STpCITvr1rDXsllQNwt-7NlooKhFxpsNnkZDelJw/exec';
    </script>

    <header class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center space-x-3">
            <img src="asset/logo.png" alt="Logo" class="h-8 w-8 rounded bg-white shadow-sm object-contain" onerror="this.src='https://via.placeholder.com/50?text=App'">
            <div>
                <h1 class="text-base font-black tracking-wide uppercase">Teacher Portal</h1>
                <p id="classTitle" class="text-xs text-blue-100 font-medium">Class: Loading...</p>
            </div>
        </div>
        <button onclick="logout()" class="text-xs font-bold bg-blue-700 hover:bg-blue-800 px-3 py-2 rounded-lg transition-all active:scale-95">
            Sign Out
        </button>
    </header>

    <main class="flex-1 overflow-y-auto p-4 pb-28 max-w-md mx-auto w-full">
        
        <div class="mb-4 flex justify-between items-center bg-white p-3.5 rounded-xl shadow-sm border border-slate-100">
            <span class="text-slate-400 text-xs font-bold uppercase tracking-wider">Date Track</span>
            <span id="displayDate" class="text-slate-700 font-extrabold text-sm"></span>
        </div>

        <form id="attendanceForm">
            <div id="studentList" class="space-y-3">
                <div class="text-center py-16 text-slate-400 text-sm font-medium animate-pulse">
                    Parsing assigned classroom database entries...
                </div>
            </div>
        </form>
    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 p-4 shadow-[0_-8px_24px_rgba(0,0,0,0.04)] max-w-md mx-auto z-40">
        <button form="attendanceForm" type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl shadow-md transition-all active:scale-95 text-base tracking-wide">
            Submit Daily Attendance
        </button>
    </div>

    <script>
        // Update Meta Tags with localized layout targets
        document.getElementById('displayDate').innerText = new Date().toLocaleDateString('en-GB', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
        document.getElementById('classTitle').innerText = `Class: ${session.assignedClass}`;

        function logout() {
            localStorage.removeItem('sessionUser');
            window.location.href = 'index.html';
        }

        // Color shift row logic based on physical tap target selection
        function updateCardColor(studentId, isPresent) {
            const card = document.getElementById(`card_${studentId}`);
            if (isPresent) {
                card.classList.remove('border-red-100', 'bg-red-50/40');
                card.classList.add('border-emerald-100', 'bg-emerald-50/40');
            } else {
                card.classList.remove('border-emerald-100', 'bg-emerald-50/40');
                card.classList.add('border-red-100', 'bg-red-50/40');
            }
        }

        // Query server runtime data matching teacher's class parameters
        async function loadClassRoster() {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'getClassStudents', className: session.assignedClass })
                });
                const data = await response.json();

                if (data.success) {
                    const listContainer = document.getElementById('studentList');
                    listContainer.innerHTML = '';

                    if (data.students.length === 0) {
                        listContainer.innerHTML = `
                            <div class="text-center text-slate-400 bg-white p-8 rounded-xl shadow-sm border border-slate-100 py-12">
                                No students linked to target class <b class="text-slate-600">${session.assignedClass}</b>. Contact your administrator node.
                            </div>`;
                        return;
                    }

                    data.students.forEach(student => {
                        // Inject fully interactive, finger-friendly mobile touch nodes
                        listContainer.innerHTML += `
                            <div id="card_${student.id}" class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex items-center justify-between transition-all border-emerald-100 bg-emerald-50/40">
                                <div>
                                    <h3 class="font-extrabold text-slate-800 tracking-tight">${student.name}</h3>
                                    <p class="text-[11px] text-slate-400 mt-0.5 font-semibold">ID: ${student.id} • Subject: <span class="text-blue-600">${student.aestheticSubject}</span></p>
                                </div>
                                
                                <div class="flex space-x-2 bg-slate-100/80 p-1 rounded-xl">
                                    <label class="cursor-pointer">
                                        <input type="radio" name="student_${student.id}" value="Present" onclick="updateCardColor('${student.id}', true)" class="peer sr-only" checked>
                                        <div class="px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider transition-all peer-checked:bg-emerald-500 peer-checked:text-white text-slate-400 bg-transparent">
                                            P
                                        </div>
                                    </label>
                                    <label class="cursor-pointer">
                                        <input type="radio" name="student_${student.id}" value="Absent" onclick="updateCardColor('${student.id}', false)" class="peer sr-only">
                                        <div class="px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider transition-all peer-checked:bg-red-500 peer-checked:text-white text-slate-400 bg-transparent">
                                            A
                                        </div>
                                    </label>
                                </div>
                            </div>
                        `;
                    });
                }
            } catch (error) {
                document.getElementById('studentList').innerHTML = `
                    <div class="text-center text-red-500 bg-red-50 p-4 rounded-xl border border-red-100 text-sm">
                        Network synchronization failure. Verify your workspace internet gateway.
                    </div>`;
            }
        }

        // Capture data loops and route array arrays to database cells
        document.getElementById('attendanceForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = 'Synchronizing Records...';
            btn.disabled = true;

            const formData = new FormData(e.target);
            let attendanceRecords = [];

            for (let [key, value] of formData.entries()) {
                let studentId = key.split('_')[1];
                attendanceRecords.push({ studentId: studentId, status: value });
            }

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'submitClassAttendance', records: attendanceRecords })
                });
                const data = await response.json();

                if (data.success) {
                    btn.innerText = 'Attendance Successfully Locked! ✓';
                    btn.classList.replace('bg-blue-600', 'bg-emerald-600');
                    
                    // Bounce UX state back to normal layout values
                    setTimeout(() => {
                        btn.innerText = 'Submit Daily Attendance';
                        btn.classList.replace('bg-emerald-600', 'bg-blue-600');
                        btn.disabled = false;
                    }, 2500);
                }
            } catch (error) {
                alert('Cell mapping update sequence error. Try re-executing data dispatch.');
                btn.innerText = 'Submit Daily Attendance';
                btn.disabled = false;
            }
        });

        // Initialize execution on render
        loadClassRoster();
    </script>
</body>
</html>
